# Codex CLI config template.
# Copy into ~/.codex/config.toml and adjust to your needs.

model = "gpt-5.2-codex"
model_reasoning_effort = "high"

# Optional: approval prompts and sandbox defaults.
# approval_policy = "on-request"
# sandbox_mode = "workspace-write"
# [sandbox_workspace_write]
# network_access = false
# writable_roots = []

# Optional: open file citations in your editor.
# file_opener = "cursor"  # or vscode, windsurf, none

# Optional: restrict env vars passed to tool commands.
# [shell_environment_policy]
# inherit = "core"
# include_only = ["PATH", "HOME"]

# Optional: feature flags (see `codex features list`).
# [features]
# parallel = true
# undo = true
# warnings = true
# remote_compaction = true
# skills = true
# shell_snapshot = true
# web_search_request = true

# Optional: per-project trust level (use absolute paths).
# [projects."__PROJECT_ROOT__"]
# trust_level = "untrusted"
